<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂繪師</title>
    <!-- 核心腳本 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#00C9A7] to-[#0089BA] min-h-screen text-[#475d5b] font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ADMIN_PASSWORD = "1234"; 

        const INITIAL_DATA = [
            { id: '1', who: "哥吉拉", where: "百貨公司", do1: "逛街", do2: "買花瓶" },
            { id: '2', who: "多拉A夢", where: "海邊", do1: "露營", do2: "吃螃蟹" },
            { id: '3', who: "唐老鴨", where: "烤鴨店", do1: "買一鴨三吃", do2: "跳街舞" },
            { id: '4', who: "派大星", where: "瑜珈教室", do1: "跳 KPOP 舞", do2: "吃糖葫蘆" },
            { id: '5', who: "三眼怪", where: "娃娃機店", do1: "吃串燒", do2: "夾娃娃" },
            { id: '6', who: "大岩蛇", where: "池塘", do1: "捉泥鰍", do2: "吹泡泡" },
            { id: '7', who: "皮卡丘", where: "公園", do1: "散步", do2: "玩皮球" },
            { id: '8', who: "史努比", where: "屋頂", do1: "睡覺", do2: "曬太陽" },
            { id: '9', who: "海綿寶寶", where: "廚房", do1: "煎魚", do2: "唱歌" },
            { id: '10', who: "兩津勘吉", where: "派出所", do1: "打電動", do2: "被所長罵" },
            { id: '11', who: "蠟筆小新", where: "客廳", do1: "露屁股", do2: "吃巧克比" },
            { id: '12', who: "美少女戰士", where: "月亮上", do1: "變身", do2: "懲罰壞人" },
            { id: '13', who: "柯南", where: "命案現場", do1: "指著兇手", do2: "射麻醉針" },
            { id: '14', who: "超級瑪利歐", where: "下水道", do1: "踩香菇", do2: "吃星星" },
            { id: '15', who: "鋼鐵人", where: "實驗室", do1: "修盔甲", do2: "吃起司堡" },
            { id: '16', who: "愛莎", where: "冰雪城堡", do1: "施展冰魔力", do2: "唱 Let it go" },
            { id: '17', who: "哈利波特", where: "圖書館", do1: "披隱形斗篷", do2: "練咒語" },
            { id: '18', who: "胖虎", where: "空地", do1: "開演唱會", do2: "拿麥克風" },
            { id: '19', who: "胡迪", where: "安弟房間", do1: "玩捉迷藏", do2: "假裝是玩具" },
            { id: '20', who: "尼莫", where: "珊瑚礁", do1: "找爸爸", do2: "游來游去" }
        ];

        function App() {
            const [questions, setQuestions] = useState([]);
            const [remainingIds, setRemainingIds] = useState([]);
            const [view, setView] = useState('slot'); 
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentSentence, setCurrentSentence] = useState("準備好開始了嗎？");
            const reelRefs = [useRef(), useRef(), useRef(), useRef()];

            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ who: '', where: '', do1: '', do2: '' });

            useEffect(() => {
                const saved = localStorage.getItem('soul_artist_questions');
                const data = saved ? JSON.parse(saved) : INITIAL_DATA;
                setQuestions(data);
                setRemainingIds(data.map(q => q.id));
            }, []);

            const saveQuestions = (data) => {
                setQuestions(data);
                setRemainingIds(data.map(q => q.id));
                localStorage.setItem('soul_artist_questions', JSON.stringify(data));
            };

            const resetPool = () => {
                setRemainingIds(questions.map(q => q.id));
                setCurrentSentence("準備好再次開始了嗎？");
            };

            const spin = () => {
                if (isSpinning || remainingIds.length === 0) return;
                
                setIsSpinning(true);
                setCurrentSentence("正在挑選題目...");

                const randomIndex = Math.floor(Math.random() * remainingIds.length);
                const targetId = remainingIds[randomIndex];
                const targetFullIndex = questions.findIndex(q => q.id === targetId);
                const height = window.innerWidth <= 640 ? 70 : 150;

                reelRefs.forEach((ref, i) => {
                    if (!ref.current) return;
                    const offset = (questions.length * 2 + targetFullIndex) * height;
                    ref.current.style.transition = `transform ${2 + i * 0.4}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    ref.current.style.transform = `translateY(-${offset}px)`;
                });

                setTimeout(() => {
                    setIsSpinning(false);
                    const q = questions[targetFullIndex];
                    setCurrentSentence(`${q.who}在${q.where}一邊${q.do1}一邊${q.do2}`);
                    setRemainingIds(prev => prev.filter(id => id !== targetId));

                    reelRefs.forEach(ref => {
                        if (!ref.current) return;
                        ref.current.style.transition = 'none';
                        ref.current.style.transform = `translateY(-${targetFullIndex * height}px)`;
                    });
                }, 2500);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdminAuthenticated(true);
                    setPasswordInput("");
                } else {
                    alert("密碼錯誤！");
                    setPasswordInput("");
                }
            };

            const handleLogout = () => {
                setIsAdminAuthenticated(false);
                setView('slot');
                setEditingId(null);
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                if (!formData.who || !formData.where || !formData.do1 || !formData.do2) return;

                if (editingId) {
                    const updated = questions.map(q => q.id === editingId ? { ...q, ...formData } : q);
                    saveQuestions(updated);
                    setEditingId(null);
                } else {
                    saveQuestions([...questions, { id: Date.now().toString(), ...formData }]);
                }
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            // 判斷結果文字顏色
            const isDefault = currentSentence === "準備好開始了嗎？" || currentSentence === "準備好再次開始了嗎？" || currentSentence === "正在挑選題目...";
            const isEmpty = remainingIds.length === 0 && !isSpinning && currentSentence !== "準備好開始了嗎？" && currentSentence !== "準備好再次開始了嗎？";
            const resultTextHighlightClass = (isEmpty || (!isSpinning && !isDefault)) ? 'text-[#fa5246]' : 'text-[#00473e]';

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* 導覽列 */}
                    <nav className="w-full max-w-4xl flex justify-between items-center mb-8 bg-white/90 backdrop-blur-md p-4 rounded-3xl border-2 border-[#00ebc7] shadow-xl">
                        <span className="text-2xl font-black text-[#00473e] tracking-tight">靈魂繪師</span>
                        <div className="flex gap-2">
                            <button onClick={() => setView('slot')} className={`px-5 py-2 rounded-2xl transition-all font-bold ${view === 'slot' ? 'bg-[#00473e] text-white shadow-lg' : 'text-[#475d5b] hover:bg-[#00C9A7]/10'}`}>抽題模式</button>
                            <button onClick={() => setView('admin')} className={`px-5 py-2 rounded-2xl transition-all font-bold ${view === 'admin' ? 'bg-[#00473e] text-white shadow-lg' : 'text-[#475d5b] hover:bg-[#00C9A7]/10'}`}>管理後台</button>
                        </div>
                    </nav>

                    {view === 'slot' ? (
                        <div className="w-full max-w-4xl text-center">
                            <div className="bg-white p-6 md:p-10 rounded-[3rem] border-4 border-[#00ebc7] shadow-[0_20px_50px_-15px_rgba(0,0,0,0.3)] relative overflow-hidden">
                                <div className="absolute top-6 right-10 text-[#00473e] text-xs font-black italic opacity-60 bg-[#00C9A7]/10 px-3 py-1 rounded-full border border-[#00ebc7]/20">
                                    剩餘題目：{remainingIds.length} / {questions.length}
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-[#f2f7f5] p-5 rounded-3xl overflow-hidden border-2 border-[#00ebc7]/10 shadow-inner mt-6">
                                    {['主角', '地點', '動作一', '動作二'].map((label, idx) => (
                                        <div key={idx} className="flex flex-col gap-2">
                                            <div className="text-[#00473e] text-xs font-black uppercase tracking-widest">{label}</div>
                                            <div className="h-[70px] md:h-[150px] bg-white rounded-2xl overflow-hidden relative border-2 border-[#00ebc7]/20 shadow-sm">
                                                <div ref={reelRefs[idx]} className="absolute w-full flex flex-col">
                                                    {[...questions, ...questions, ...questions].map((q, i) => (
                                                        <div key={i} className="h-[70px] md:h-[150px] flex items-center justify-center font-bold text-lg border-b border-[#f2f7f5] px-2 leading-tight text-center text-[#fa5246]">
                                                            {q[['who', 'where', 'do1', 'do2'][idx]]}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {remainingIds.length > 0 ? (
                                    <button onClick={spin} disabled={isSpinning} className="mt-10 px-16 py-5 bg-gradient-to-r from-[#00C9A7] to-[#0089BA] text-white rounded-full text-2xl font-black hover:scale-105 transition-all active:scale-95 shadow-[0_10px_20px_rgba(0,201,167,0.3)] disabled:grayscale">
                                        {isSpinning ? '抽取中...' : '開始抽選'}
                                    </button>
                                ) : (
                                    <button onClick={resetPool} className="mt-10 px-16 py-5 bg-[#00473e] text-white rounded-full text-2xl font-black hover:scale-105 transition-all active:scale-95 shadow-lg">
                                        重置題庫池
                                    </button>
                                )}

                                <div className={`mt-10 bg-[#f2f7f5]/50 p-8 rounded-3xl text-xl md:text-3xl font-black min-h-[140px] flex items-center justify-center border-2 border-[#00ebc7]/10 shadow-inner leading-relaxed transition-colors duration-300 ${resultTextHighlightClass}`}>
                                    {remainingIds.length === 0 && !isSpinning && !isDefault ? "Oh no！沒題目了" : currentSentence}
                                </div>
                            </div>
                        </div>
                    ) : (
                        !isAdminAuthenticated ? (
                            <div className="w-full max-w-md bg-white p-10 rounded-[2.5rem] border-2 border-[#00ebc7] shadow-2xl text-center">
                                <div className="w-20 h-20 bg-[#f2f7f5] rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-[#00ebc7]/30 shadow-inner">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00473e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                    </svg>
                                </div>
                                
                                <h2 className="text-3xl font-black text-[#00473e] mb-8">管理員驗證</h2>
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <input type="password" autoFocus value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="輸入密碼" className="w-full bg-[#f2f7f5] border-2 border-[#00ebc7]/30 text-[#00473e] rounded-2xl p-5 text-center text-2xl tracking-widest outline-none focus:border-[#00C9A7] transition" />
                                    <button type="submit" className="w-full bg-gradient-to-r from-[#00C9A7] to-[#0089BA] text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">登入系統</button>
                                </form>
                            </div>
                        ) : (
                            <div className="w-full max-w-4xl flex flex-col gap-6 animate-fade-in">
                                <div className="flex justify-between items-center bg-white p-5 rounded-3xl border-2 border-[#00ebc7] shadow-lg">
                                    <span className="text-[#00473e] text-lg font-black italic">管理模式 ({questions.length} 筆)</span>
                                    <button onClick={handleLogout} className="bg-[#f2f7f5] text-[#fa5246] px-6 py-2 rounded-xl text-sm font-black hover:bg-[#fa5246]/10 transition border border-[#fa5246]/20 shadow-sm">登出</button>
                                </div>
                                <div className={`bg-white p-8 rounded-3xl border-2 shadow-xl transition-all ${editingId ? 'border-[#fa5246]' : 'border-[#00ebc7]'}`}>
                                    <h3 className="text-2xl font-black mb-6 text-[#00473e]">{editingId ? '🛠️ 修改題目' : '➕ 新增題目'}</h3>
                                    <form onSubmit={handleFormSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        {['who', 'where', 'do1', 'do2'].map((f, i) => (
                                            <div key={f}>
                                                <label className="block text-xs font-black text-[#00473e] mb-1 opacity-60 uppercase">{['主角', '地點', '動作一', '動作二'][i]}</label>
                                                <input type="text" value={formData[f]} onChange={(e) => setFormData({...formData, [f]: e.target.value})} className="w-full bg-[#f2f7f5] border-2 border-[#00ebc7]/20 p-4 rounded-xl font-bold text-[#475d5b] outline-none focus:border-[#00C9A7]" placeholder="..." />
                                            </div>
                                        ))}
                                        <div className="md:col-span-2 flex gap-4 mt-2">
                                            <button type="submit" className={`flex-1 py-5 rounded-2xl font-black text-lg shadow-xl text-white ${editingId ? 'bg-[#fa5246]' : 'bg-[#00473e]'}`}>{editingId ? '儲存變更' : '確認新增'}</button>
                                            {editingId && <button onClick={() => {setEditingId(null); setFormData({who:'',where:'',do1:'',do2:''})}} className="px-8 bg-slate-200 rounded-2xl font-black">取消</button>}
                                        </div>
                                    </form>
                                </div>
                                <div className="bg-white p-8 rounded-3xl border-2 border-[#00ebc7] shadow-xl overflow-hidden">
                                    <div className="flex justify-between items-center mb-6 border-b-2 border-[#f2f7f5] pb-4">
                                        <h3 className="text-xl font-black text-[#00473e]">題庫池</h3>
                                        <button onClick={() => {if(confirm('重置後會遺失所有自訂題目，確定嗎？')) saveQuestions(INITIAL_DATA)}} className="text-[#fa5246] font-black underline text-sm">恢復預設題庫</button>
                                    </div>
                                    <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                        {questions.map(q => (
                                            <div key={q.id} className="p-4 bg-[#f2f7f5] border-2 border-transparent rounded-2xl flex justify-between items-center hover:border-[#00ebc7]/30 transition">
                                                <span className="text-base font-bold text-[#00473e] leading-relaxed">
                                                    {q.who} 在 {q.where} 一邊{q.do1}一邊{q.do2}
                                                </span>
                                                <div className="flex gap-3">
                                                    <button onClick={() => {setEditingId(q.id); setFormData(q); window.scrollTo({top:0, behavior:'smooth'})}} className="bg-white text-[#00473e] px-4 py-2 rounded-xl text-xs font-black border border-[#00ebc7]/30 shadow-sm">修改</button>
                                                    <button onClick={() => {if(confirm('刪除後不可恢復，確定？')) saveQuestions(questions.filter(x => x.id !== q.id))}} className="bg-white text-[#fa5246] px-4 py-2 rounded-xl text-xs font-black border border-[#fa5246]/30 shadow-sm">刪除</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f2f7f5; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00ebc7; border-radius: 10px; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
    </style>
</body>
</html>
