<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂繪師 - 地端免安裝版</title>
    <!-- 核心腳本：請確保 src 內只有純網址 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ADMIN_PASSWORD = "1234"; // 你可以在這裡修改預設密碼

        const INITIAL_DATA = [
            { id: '1', who: "哥吉拉", where: "百貨公司", do1: "逛街", do2: "買花瓶" },
            { id: '2', who: "多拉A夢", where: "海邊", do1: "露營", do2: "吃螃蟹" },
            { id: '3', who: "唐老鴨", where: "烤鴨店", do1: "買一鴨三吃", do2: "跳街舞" },
            { id: '4', who: "派大星", where: "瑜珈教室", do1: "跳 KPOP 舞", do2: "吃糖葫蘆" },
            { id: '5', who: "三眼怪", where: "娃娃機店", do1: "吃串燒", do2: "夾娃娃" },
            { id: '6', who: "大岩蛇", where: "池塘", do1: "捉泥鰍", do2: "吹泡泡" },
            { id: '7', who: "皮卡丘", where: "公園", do1: "散步", do2: "玩皮球" },
            { id: '8', who: "史努比", where: "屋頂", do1: "睡覺", do2: "曬太陽" },
            { id: '9', who: "海綿寶寶", where: "廚房", do1: "煎魚", do2: "唱歌" },
            { id: '10', who: "兩津勘吉", where: "派出所", do1: "打電動", do2: "被所長罵" },
            { id: '11', who: "蠟筆小新", where: "客廳", do1: "露屁股", do2: "吃巧克比" },
            { id: '12', who: "美少女戰士", where: "月亮上", do1: "變身", do2: "懲罰壞人" },
            { id: '13', who: "柯南", where: "命案現場", do1: "指著兇手", do2: "射麻醉針" },
            { id: '14', who: "超級瑪利歐", where: "下水道", do1: "踩香菇", do2: "吃星星" },
            { id: '15', who: "鋼鐵人", where: "實驗室", do1: "修盔甲", do2: "吃起司漢堡" },
            { id: '16', who: "愛莎", where: "冰雪城堡", do1: "施展冰魔力", do2: "唱 Let it go" },
            { id: '17', who: "哈利波特", where: "圖書館", do1: "披隱形斗篷", do2: "練咒語" },
            { id: '18', who: "胖虎", where: "空地", do1: "開演唱會", do2: "拿麥克風" },
            { id: '19', who: "胡迪", where: "安弟房間", do1: "玩捉迷藏", do2: "假裝是玩具" },
            { id: '20', who: "尼莫", where: "珊瑚礁", do1: "找爸爸", do2: "游來游去" }
        ];

        function App() {
            const [questions, setQuestions] = useState([]);
            const [view, setView] = useState('slot'); // 'slot', 'admin'
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentSentence, setCurrentSentence] = useState("點擊按鈕抽取題目");
            const reelRefs = [useRef(), useRef(), useRef(), useRef()];

            // 管理後臺相關狀態
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                who: '',
                where: '',
                do1: '',
                do2: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('soul_artist_questions');
                setQuestions(saved ? JSON.parse(saved) : INITIAL_DATA);
            }, []);

            const saveQuestions = (data) => {
                setQuestions(data);
                localStorage.setItem('soul_artist_questions', JSON.stringify(data));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdminAuthenticated(true);
                    setPasswordInput("");
                } else {
                    alert("密碼錯誤！");
                    setPasswordInput("");
                }
            };

            const handleLogout = () => {
                setIsAdminAuthenticated(false);
                setView('slot');
                setEditingId(null);
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                if (!formData.who || !formData.where || !formData.do1 || !formData.do2) {
                    alert("請填寫所有欄位！");
                    return;
                }

                if (editingId) {
                    // 修改現有題目
                    const updatedQuestions = questions.map(q => 
                        q.id === editingId ? { ...q, ...formData } : q
                    );
                    saveQuestions(updatedQuestions);
                    setEditingId(null);
                    alert("修改成功！");
                } else {
                    // 新增題目
                    const newQuestion = {
                        id: Date.now().toString(),
                        ...formData
                    };
                    saveQuestions([...questions, newQuestion]);
                    alert("新增成功！");
                }
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const handleEditStart = (q) => {
                setEditingId(q.id);
                setFormData({
                    who: q.who,
                    where: q.where,
                    do1: q.do1,
                    do2: q.do2
                });
                // 捲動回頂部表單
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const spin = () => {
                if (isSpinning || questions.length === 0) return;
                setIsSpinning(true);
                setCurrentSentence("???");
                const target = Math.floor(Math.random() * questions.length);
                const height = window.innerWidth <= 640 ? 70 : 150;

                reelRefs.forEach((ref, i) => {
                    if (!ref.current) return;
                    const offset = (questions.length * 2 + target) * height;
                    ref.current.style.transition = `transform ${2 + i * 0.4}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    ref.current.style.transform = `translateY(-${offset}px)`;
                });

                setTimeout(() => {
                    setIsSpinning(false);
                    const q = questions[target];
                    setCurrentSentence(`${q.who}在${q.where}${q.do1}，同時${q.do2}`);
                    reelRefs.forEach(ref => {
                        if (!ref.current) return;
                        ref.current.style.transition = 'none';
                        ref.current.style.transform = `translateY(-${target * height}px)`;
                    });
                }, 2500);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <nav className="w-full max-w-4xl flex justify-between items-center mb-8 bg-white/5 p-4 rounded-2xl border border-white/10 shadow-lg">
                        <span className="text-xl font-black">靈魂繪師 <span className="text-indigo-400">WEB</span></span>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setView('slot')} 
                                className={`px-4 py-2 rounded-xl transition ${view === 'slot' ? 'bg-indigo-600' : 'hover:bg-white/10'}`}
                            >
                                抽題模式
                            </button>
                            <button 
                                onClick={() => setView('admin')} 
                                className={`px-4 py-2 rounded-xl transition ${view === 'admin' ? 'bg-indigo-600' : 'hover:bg-white/10'}`}
                            >
                                管理後台
                            </button>
                        </div>
                    </nav>

                    {view === 'slot' ? (
                        /* 抽題介面 */
                        <div className="w-full max-w-4xl text-center">
                            <div className="bg-slate-800 p-6 rounded-[2.5rem] border-8 border-slate-700 shadow-2xl relative">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-3 bg-slate-950 p-4 rounded-2xl overflow-hidden shadow-inner">
                                    {['主角', '地點', '動作一', '動作二'].map((label, idx) => (
                                        <div key={idx} className="flex flex-col gap-2">
                                            <div className="text-indigo-400 text-xs font-bold uppercase tracking-widest">{label}</div>
                                            <div className="h-[70px] md:h-[150px] bg-white rounded-xl overflow-hidden relative shadow-inner">
                                                <div ref={reelRefs[idx]} className="absolute w-full flex flex-col">
                                                    {[...questions, ...questions, ...questions].map((q, i) => (
                                                        <div key={i} className="h-[70px] md:h-[150px] flex items-center justify-center text-slate-800 font-bold text-lg border-b border-slate-100 px-2 leading-tight text-center">
                                                            {q[['who', 'where', 'do1', 'do2'][idx]]}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={spin} disabled={isSpinning} className="mt-8 px-12 py-4 bg-indigo-600 rounded-full text-xl font-bold hover:bg-indigo-500 transition active:scale-95 shadow-lg">
                                    {isSpinning ? '抽取中...' : '開始抽選'}
                                </button>
                                <div className="mt-8 bg-slate-900 p-6 rounded-2xl text-xl md:text-2xl font-bold text-indigo-300 min-h-[120px] flex items-center justify-center shadow-inner border border-white/5 leading-relaxed">
                                    {currentSentence}
                                </div>
                            </div>
                        </div>
                    ) : (
                        /* 管理後台邏輯 */
                        !isAdminAuthenticated ? (
                            /* 登入介面 */
                            <div className="w-full max-w-md bg-slate-800 p-8 rounded-3xl border border-white/10 shadow-2xl text-center">
                                <div className="mb-6">
                                    <div className="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                    </div>
                                    <h2 className="text-2xl font-bold text-white">管理員驗證</h2>
                                    <p className="text-slate-400 text-sm mt-2">請輸入後台管理密碼以繼續</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="password" 
                                        autoFocus
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        placeholder="輸入密碼"
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center text-xl tracking-widest focus:border-indigo-500 outline-none transition"
                                    />
                                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition shadow-lg">
                                        驗證並登入
                                    </button>
                                </form>
                            </div>
                        ) : (
                            /* 管理主介面 */
                            <div className="w-full max-w-4xl flex flex-col gap-6 animate-in fade-in zoom-in duration-300">
                                <div className="flex justify-between items-center bg-slate-800 p-4 rounded-2xl border border-white/5">
                                    <span className="text-slate-400 text-sm font-bold">已登入管理模式</span>
                                    <button 
                                        onClick={handleLogout}
                                        className="bg-red-500/10 text-red-400 px-4 py-1 rounded-lg text-sm font-bold hover:bg-red-500/20 transition"
                                    >
                                        登出並鎖定
                                    </button>
                                </div>

                                {/* 編輯/新增表單 */}
                                <div className={`bg-slate-800 p-6 rounded-2xl border shadow-xl transition-colors duration-500 ${editingId ? 'border-yellow-500/50 bg-slate-800/80' : 'border-white/5'}`}>
                                    <h3 className="text-xl font-bold mb-4 text-indigo-400">
                                        {editingId ? '🛠️ 修改題目內容' : '➕ 新增自訂題目'}
                                    </h3>
                                    <form onSubmit={handleFormSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-slate-400 mb-1 font-bold">主角 (誰)</label>
                                            <input 
                                                type="text" 
                                                value={formData.who}
                                                onChange={(e) => setFormData({...formData, who: e.target.value})}
                                                className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:border-indigo-500 outline-none"
                                                placeholder="例如：哥吉拉"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-400 mb-1 font-bold">地點 (在哪裡)</label>
                                            <input 
                                                type="text" 
                                                value={formData.where}
                                                onChange={(e) => setFormData({...formData, where: e.target.value})}
                                                className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:border-indigo-500 outline-none"
                                                placeholder="例如：百貨公司"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-400 mb-1 font-bold">動作一</label>
                                            <input 
                                                type="text" 
                                                value={formData.do1}
                                                onChange={(e) => setFormData({...formData, do1: e.target.value})}
                                                className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:border-indigo-500 outline-none"
                                                placeholder="例如：逛街"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-400 mb-1 font-bold">動作二</label>
                                            <input 
                                                type="text" 
                                                value={formData.do2}
                                                onChange={(e) => setFormData({...formData, do2: e.target.value})}
                                                className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:border-indigo-500 outline-none"
                                                placeholder="例如：買花瓶"
                                            />
                                        </div>
                                        <div className="md:col-span-2 flex gap-3">
                                            <button type="submit" className={`flex-1 py-3 rounded-xl font-bold transition shadow-lg mt-2 ${editingId ? 'bg-yellow-500 text-slate-900 hover:bg-yellow-400' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}>
                                                {editingId ? '儲存修改' : '確認新增'}
                                            </button>
                                            {editingId && (
                                                <button 
                                                    type="button" 
                                                    onClick={handleCancelEdit}
                                                    className="mt-2 px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition"
                                                >
                                                    取消
                                                </button>
                                            )}
                                        </div>
                                    </form>
                                </div>

                                {/* 題庫列表 */}
                                <div className="bg-slate-800 p-6 rounded-2xl border border-white/5 shadow-xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-bold text-indigo-400">目前題庫 ({questions.length})</h3>
                                        <button onClick={() => {if(confirm('確定要恢復預設嗎？')) saveQuestions(INITIAL_DATA)}} className="text-red-400 hover:text-red-300 transition underline text-sm font-bold">恢復預設題庫</button>
                                    </div>
                                    <div className="space-y-2 mt-4 text-left max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                        {questions.map(q => (
                                            <div key={q.id} className={`p-4 bg-slate-900/50 border rounded-xl flex justify-between items-center group transition-all duration-300 ${editingId === q.id ? 'border-yellow-500 bg-slate-900' : 'border-white/5 hover:bg-slate-900'}`}>
                                                <span className="text-sm text-slate-300 flex-1 pr-4">
                                                    <span className="font-bold text-indigo-400">{q.who}</span> 在 
                                                    <span className="font-bold text-indigo-400"> {q.where} </span> 
                                                    <span className="text-white">{q.do1}</span> 且 
                                                    <span className="text-white">{q.do2}</span>
                                                </span>
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={() => handleEditStart(q)}
                                                        className="text-yellow-500 hover:bg-yellow-500/10 px-3 py-1 rounded-lg transition font-bold text-sm"
                                                    >
                                                        修改
                                                    </button>
                                                    <button 
                                                        onClick={() => saveQuestions(questions.filter(item => item.id !== q.id))}
                                                        className="text-red-500 hover:bg-red-500/10 px-3 py-1 rounded-lg transition opacity-60 group-hover:opacity-100 font-bold text-sm"
                                                    >
                                                        刪除
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        {questions.length === 0 && <div className="text-center text-slate-500 py-8 italic">目前題庫是空的，請手動新增。</div>}
                                    </div>
                                </div>
                            </div>
                        )
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</body>
</html>
