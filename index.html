<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂繪師</title>
    <!-- 核心腳本：請確保 src 內只有純網址 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#00C9A7] to-[#0089BA] min-h-screen text-[#475d5b]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ADMIN_PASSWORD = "1234"; 

        const INITIAL_DATA = [
            { id: '1', who: "哥吉拉", where: "百貨公司", do1: "逛街", do2: "買花瓶" },
            { id: '2', who: "多拉A夢", where: "海邊", do1: "露營", do2: "吃螃蟹" },
            { id: '3', who: "唐老鴨", where: "烤鴨店", do1: "買一鴨三吃", do2: "跳街舞" },
            { id: '4', who: "派大星", where: "瑜珈教室", do1: "跳 KPOP 舞", do2: "吃糖葫蘆" },
            { id: '5', who: "三眼怪", where: "娃娃機店", do1: "吃串燒", do2: "夾娃娃" },
            { id: '6', who: "大岩蛇", where: "池塘", do1: "捉泥鰍", do2: "吹泡泡" },
            { id: '7', who: "皮卡丘", where: "公園", do1: "散步", do2: "玩皮球" },
            { id: '8', who: "史努比", where: "屋頂", do1: "睡覺", do2: "曬太陽" },
            { id: '9', who: "海綿寶寶", where: "廚房", do1: "煎魚", do2: "唱歌" },
            { id: '10', who: "兩津勘吉", where: "派出所", do1: "打電動", do2: "被所長罵" },
            { id: '11', who: "蠟筆小新", where: "客廳", do1: "露屁股", do2: "吃巧克比" },
            { id: '12', who: "美少女戰士", where: "月亮上", do1: "變身", do2: "懲罰壞人" },
            { id: '13', who: "柯南", where: "命案現場", do1: "指著兇手", do2: "射麻醉針" },
            { id: '14', who: "超級瑪利歐", where: "下水道", do1: "踩香菇", do2: "吃星星" },
            { id: '15', who: "鋼鐵人", where: "實驗室", do1: "修盔甲", do2: "吃起司堡" },
            { id: '16', who: "愛莎", where: "冰雪城堡", do1: "施展冰魔力", do2: "唱 Let it go" },
            { id: '17', who: "哈利波特", where: "圖書館", do1: "披隱形斗篷", do2: "練咒語" },
            { id: '18', who: "胖虎", where: "空地", do1: "開演唱會", do2: "拿麥克風" },
            { id: '19', who: "胡迪", where: "安弟房間", do1: "玩捉迷藏", do2: "假裝是玩具" },
            { id: '20', who: "尼莫", where: "珊瑚礁", do1: "找爸爸", do2: "游來游去" }
        ];

        function App() {
            const [questions, setQuestions] = useState([]);
            const [view, setView] = useState('slot'); 
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentSentence, setCurrentSentence] = useState("準備好開始了嗎？");
            const reelRefs = [useRef(), useRef(), useRef(), useRef()];

            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                who: '',
                where: '',
                do1: '',
                do2: ''
            });

            useEffect(() => {
                const saved = localStorage.getItem('soul_artist_questions');
                setQuestions(saved ? JSON.parse(saved) : INITIAL_DATA);
            }, []);

            const saveQuestions = (data) => {
                setQuestions(data);
                localStorage.setItem('soul_artist_questions', JSON.stringify(data));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAdminAuthenticated(true);
                    setPasswordInput("");
                } else {
                    alert("密碼錯誤！");
                    setPasswordInput("");
                }
            };

            const handleLogout = () => {
                setIsAdminAuthenticated(false);
                setView('slot');
                setEditingId(null);
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                if (!formData.who || !formData.where || !formData.do1 || !formData.do2) {
                    alert("請填寫所有欄位！");
                    return;
                }

                if (editingId) {
                    const updatedQuestions = questions.map(q => 
                        q.id === editingId ? { ...q, ...formData } : q
                    );
                    saveQuestions(updatedQuestions);
                    setEditingId(null);
                    alert("修改成功！");
                } else {
                    const newQuestion = {
                        id: Date.now().toString(),
                        ...formData
                    };
                    saveQuestions([...questions, newQuestion]);
                    alert("新增成功！");
                }
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const handleEditStart = (q) => {
                setEditingId(q.id);
                setFormData({
                    who: q.who,
                    where: q.where,
                    do1: q.do1,
                    do2: q.do2
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setFormData({ who: '', where: '', do1: '', do2: '' });
            };

            const spin = () => {
                if (isSpinning || questions.length === 0) return;
                setIsSpinning(true);
                setCurrentSentence("正在為您挑選靈魂題目...");
                const target = Math.floor(Math.random() * questions.length);
                const height = window.innerWidth <= 640 ? 70 : 150;

                reelRefs.forEach((ref, i) => {
                    if (!ref.current) return;
                    const offset = (questions.length * 2 + target) * height;
                    ref.current.style.transition = `transform ${2 + i * 0.4}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    ref.current.style.transform = `translateY(-${offset}px)`;
                });

                setTimeout(() => {
                    setIsSpinning(false);
                    const q = questions[target];
                    // 修改連結詞為：一邊...一邊...
                    setCurrentSentence(`${q.who}在${q.where}一邊${q.do1}一邊${q.do2}`);
                    reelRefs.forEach(ref => {
                        if (!ref.current) return;
                        ref.current.style.transition = 'none';
                        ref.current.style.transform = `translateY(-${target * height}px)`;
                    });
                }, 2500);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* 導覽列 */}
                    <nav className="w-full max-w-4xl flex justify-between items-center mb-8 bg-[#fffffe]/90 backdrop-blur-sm p-4 rounded-3xl border-2 border-[#00ebc7] shadow-xl">
                        <span className="text-2xl font-black text-[#00473e] tracking-tight">靈魂繪師</span>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setView('slot')} 
                                className={`px-5 py-2 rounded-2xl transition-all duration-300 font-bold ${view === 'slot' ? 'bg-gradient-to-r from-[#00C9A7] to-[#0089BA] text-white shadow-lg' : 'text-[#475d5b] hover:bg-[#00C9A7]/10'}`}
                            >
                                抽題模式
                            </button>
                            <button 
                                onClick={() => setView('admin')} 
                                className={`px-5 py-2 rounded-2xl transition-all duration-300 font-bold ${view === 'admin' ? 'bg-gradient-to-r from-[#00C9A7] to-[#0089BA] text-white shadow-lg' : 'text-[#475d5b] hover:bg-[#00C9A7]/10'}`}
                            >
                                管理後台
                            </button>
                        </div>
                    </nav>

                    {view === 'slot' ? (
                        <div className="w-full max-w-4xl text-center">
                            <div className="bg-[#fffffe] p-8 md:p-10 rounded-[3rem] border-4 border-[#00ebc7] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] relative">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-[#f2f7f5] p-5 rounded-3xl overflow-hidden border-2 border-[#00ebc7]/20 shadow-inner">
                                    {['主角', '地點', '動作一', '動作二'].map((label, idx) => (
                                        <div key={idx} className="flex flex-col gap-3">
                                            <div className="text-[#00473e] text-xs font-black uppercase tracking-[0.2em]">{label}</div>
                                            <div className="h-[70px] md:h-[150px] bg-[#fffffe] rounded-2xl overflow-hidden relative border-2 border-[#00C9A7]/10 shadow-sm group">
                                                <div ref={reelRefs[idx]} className="absolute w-full flex flex-col">
                                                    {[...questions, ...questions, ...questions].map((q, i) => (
                                                        <div key={i} className="h-[70px] md:h-[150px] flex items-center justify-center text-[#475d5b] font-bold text-lg border-b border-[#f2f7f5] px-3 leading-tight text-center">
                                                            {q[['who', 'where', 'do1', 'do2'][idx]]}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                <button 
                                    onClick={spin} 
                                    disabled={isSpinning} 
                                    className="mt-10 px-16 py-5 bg-gradient-to-r from-[#00C9A7] via-[#0089BA] to-[#00C9A7] bg-[length:200%_auto] text-white rounded-full text-2xl font-black hover:bg-right transition-all duration-500 active:scale-95 shadow-[0_10px_20px_rgba(0,201,167,0.3)] disabled:grayscale"
                                >
                                    {isSpinning ? '靈魂挑選中...' : '開始抽選題目'}
                                </button>
                                
                                <div className="mt-10 bg-white p-8 rounded-3xl text-xl md:text-3xl font-black text-[#00473e] min-h-[140px] flex items-center justify-center border-2 border-[#00ebc7]/30 shadow-inner leading-relaxed animate-pulse-slow">
                                    {currentSentence}
                                </div>
                            </div>
                        </div>
                    ) : (
                        !isAdminAuthenticated ? (
                            <div className="w-full max-w-md bg-[#fffffe] p-10 rounded-[2.5rem] border-2 border-[#00ebc7] shadow-2xl text-center animate-fade-in">
                                <div className="mb-8">
                                    <div className="w-20 h-20 bg-gradient-to-br from-[#00C9A7] to-[#0089BA] rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                    </div>
                                    <h2 className="text-3xl font-black text-[#00473e]">管理員驗證</h2>
                                    <p className="text-[#475d5b] text-sm mt-3 font-bold opacity-70">進入地端題庫管理系統</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-5">
                                    <input 
                                        type="password" 
                                        autoFocus
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        placeholder="請輸入管理密碼"
                                        className="w-full bg-[#f2f7f5] border-2 border-[#00ebc7]/30 text-[#00473e] rounded-2xl p-5 text-center text-xl tracking-widest focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/10 outline-none transition-all"
                                    />
                                    <button type="submit" className="w-full bg-gradient-to-r from-[#00C9A7] to-[#0089BA] text-white py-5 rounded-2xl font-black text-lg transition shadow-xl active:scale-95">
                                        驗證權限
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="w-full max-w-4xl flex flex-col gap-6 animate-fade-in">
                                <div className="flex justify-between items-center bg-[#fffffe] p-5 rounded-3xl border-2 border-[#00ebc7] shadow-lg">
                                    <span className="text-[#00473e] text-lg font-black flex items-center gap-2">
                                        <span className="w-3 h-3 bg-[#00ebc7] rounded-full animate-pulse"></span>
                                        已進入管理模式
                                    </span>
                                    <button 
                                        onClick={handleLogout}
                                        className="bg-[#f2f7f5] text-[#fa5246] px-6 py-2 rounded-xl text-sm font-black hover:bg-[#fa5246]/10 transition border-2 border-[#fa5246]/20 shadow-sm"
                                    >
                                        登出並鎖定
                                    </button>
                                </div>

                                {/* 編輯區 */}
                                <div className={`bg-[#fffffe] p-8 rounded-3xl border-2 shadow-xl transition-all duration-500 ${editingId ? 'border-[#fa5246] ring-4 ring-[#fa5246]/5' : 'border-[#00ebc7]'}`}>
                                    <h3 className="text-2xl font-black mb-6 text-[#00473e] flex items-center gap-2">
                                        {editingId ? '🛠️ 修改題目' : '➕ 新增組合'}
                                    </h3>
                                    <form onSubmit={handleFormSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        {[
                                            { id: 'who', label: '主角 (誰)' },
                                            { id: 'where', label: '地點 (在哪)' },
                                            { id: 'do1', label: '動作一' },
                                            { id: 'do2', label: '動作二' }
                                        ].map(field => (
                                            <div key={field.id}>
                                                <label className="block text-xs text-[#00473e] mb-2 font-black uppercase tracking-widest opacity-60">{field.label}</label>
                                                <input 
                                                    type="text" 
                                                    value={formData[field.id]}
                                                    onChange={(e) => setFormData({...formData, [field.id]: e.target.value})}
                                                    className="w-full bg-[#f2f7f5] border-2 border-[#00ebc7]/10 text-[#475d5b] rounded-xl p-4 focus:border-[#00C9A7] outline-none font-bold transition-all"
                                                    placeholder="..."
                                                />
                                            </div>
                                        ))}
                                        <div className="md:col-span-2 flex gap-4 mt-2">
                                            <button type="submit" className={`flex-1 py-5 rounded-2xl font-black text-lg transition shadow-xl ${editingId ? 'bg-[#fa5246] text-white' : 'bg-[#00473e] text-white hover:bg-[#005B44]'}`}>
                                                {editingId ? '儲存變更' : '確認新增'}
                                            </button>
                                            {editingId && (
                                                <button 
                                                    type="button" 
                                                    onClick={handleCancelEdit}
                                                    className="px-8 py-5 bg-[#f2f7f5] text-[#475d5b] rounded-2xl font-black transition border-2 border-[#00473e]/10 hover:bg-white shadow-md"
                                                >
                                                    取消
                                                </button>
                                            )}
                                        </div>
                                    </form>
                                </div>

                                {/* 題庫清單 */}
                                <div className="bg-[#fffffe] p-8 rounded-3xl border-2 border-[#00ebc7] shadow-xl">
                                    <div className="flex justify-between items-center mb-6 pb-4 border-b-2 border-[#f2f7f5]">
                                        <h3 className="text-2xl font-black text-[#00473e]">本地題庫 <span className="text-[#00C9A7]">({questions.length})</span></h3>
                                        <button onClick={() => {if(confirm('確定要恢復預設嗎？')) saveQuestions(INITIAL_DATA)}} className="text-[#fa5246] hover:underline text-sm font-black tracking-widest">重設題庫</button>
                                    </div>
                                    <div className="space-y-4 text-left max-h-[500px] overflow-y-auto pr-3 custom-scrollbar">
                                        {questions.map(q => (
                                            <div key={q.id} className={`p-5 bg-[#f2f7f5] border-2 rounded-2xl flex justify-between items-center group transition-all duration-300 ${editingId === q.id ? 'border-[#fa5246] bg-white scale-[1.02]' : 'border-transparent hover:border-[#00ebc7]/40 hover:shadow-md'}`}>
                                                <span className="text-base text-[#475d5b] flex-1 pr-6 leading-relaxed font-bold">
                                                    <span className="text-[#00C9A7] font-black">{q.who}</span> 在 
                                                    <span className="text-[#0089BA] font-black"> {q.where} </span> 
                                                    {/* 後臺顯示同樣修改為：一邊...一邊... */}
                                                    一邊<span className="text-[#00473e]">{q.do1}</span>一邊<span className="text-[#00473e]">{q.do2}</span>
                                                </span>
                                                <div className="flex gap-3 shrink-0">
                                                    <button 
                                                        onClick={() => handleEditStart(q)}
                                                        className="bg-white text-[#00473e] hover:bg-[#00473e] hover:text-white px-4 py-2 rounded-xl transition font-black text-sm border-2 border-[#00473e]/20"
                                                    >
                                                        修改
                                                    </button>
                                                    <button 
                                                        onClick={() => saveQuestions(questions.filter(item => item.id !== q.id))}
                                                        className="bg-white text-[#fa5246] hover:bg-[#fa5246] hover:text-white px-4 py-2 rounded-xl transition font-black text-sm border-2 border-[#fa5246]/20"
                                                    >
                                                        刪除
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f2f7f5; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00ebc7; border-radius: 10px; border: 2px solid #f2f7f5; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #0089BA; }
        
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite ease-in-out; }
        
        /* 滾輪在手機版的優化 */
        @media (max-width: 640px) {
            .h-\[70px\] { height: 70px !important; }
        }
    </style>
</body>
</html>
